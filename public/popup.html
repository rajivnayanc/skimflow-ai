<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkimFlow AI</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <header>
        <h2>SkimFlow AI</h2>
        <div class="subtitle">AI-Powered RSVP Reader</div>
    </header>

    <main>
        <div class="control-group">
            <label for="wpm">Reading Speed (WPM)</label>
            <input type="number" id="wpm" min="50" max="1000" step="50" value="200" placeholder="e.g. 200">
        </div>

        <div class="control-group">
            <label for="theme">Theme</label>
            <select id="theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="auto">System</option>
            </select>
        </div>

        <div class="control-group">
            <div class="checkbox-card" onclick="document.getElementById('smartHighlight').click()">
                <input type="checkbox" id="smartHighlight" checked onclick="event.stopPropagation()">
                <label for="smartHighlight">Smart Highlight</label>
            </div>
        </div>

        <button id="startData" class="action-btn">Start Reading</button>
    </main>

    <script type="module" src="../src/popup.js"></script>
</body>

</html>
