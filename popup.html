<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Reading</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
        }

        h2 {
            margin-top: 0;
            color: #333;
            font-size: 18px;
            text-align: center;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #222;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #444;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 8px;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h2>Faster Reading</h2>

    <div class="control-group">
        <label for="wpm">Speed (WPM):</label>
        <input type="number" id="wpm" min="50" max="1000" step="50" value="300">
    </div>

    <div class="control-group">
        <label for="theme">Theme:</label>
        <select id="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="auto">System</option>
        </select>
    </div>

    <div class="control-group checkbox-group">
        <input type="checkbox" id="smartHighlight" checked>
        <label for="smartHighlight" title="Bionic Reading style: Bold the first few letters of each word">Smart
            Highlight</label>
    </div>

    <button id="startData">Start Reading</button>

    <script src="popup.js"></script>
</body>

</html>
