<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faster Reading</title>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s;
            margin-bottom: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        button.secondary {
            background-color: #6c757d;
        }

        button.secondary:hover {
            background-color: #545b62;
        }

        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>

<body>
    <h2>Faster Reading</h2>

    <div class="control-group">
        <label for="wpm">Words Per Minute</label>
        <input type="number" id="wpm" value="300" min="50" max="1000" step="50">
    </div>

    <button id="startBtn">Start Reading</button>
    <button id="stopBtn" class="secondary" style="display: none;">Stop Reading</button>

    <div class="status" id="statusMsg">Ready to read</div>

    <script src="popup.js"></script>
</body>

</html>
